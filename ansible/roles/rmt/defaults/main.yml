---
# RMT role default variables

# Database configuration
rmt_db_host: localhost
rmt_db_name: rmt
rmt_db_username: rmt
rmt_db_password: ""
rmt_db_adapter: mysql2
rmt_db_encoding: utf8
rmt_db_timeout: 5000
rmt_db_pool: 5

# SCC configuration
rmt_sync_systems: true
rmt_metrics_enabled: false
rmt_metrics_job_name: rmt

# Mirroring configuration
rmt_mirror_drpm: true
rmt_mirror_src: false
rmt_revalidate_repodata: true
rmt_dedup_method: hardlink

# HTTP client configuration
rmt_http_client_verbose: false
rmt_http_proxy: ""
rmt_http_proxy_auth: ""
rmt_http_proxy_user: ""
rmt_http_proxy_password: ""
rmt_low_speed_limit: 512
rmt_low_speed_time: 120

# Log level configuration
rmt_log_level_rails: info
rmt_log_level_cli: info

# Web server configuration
rmt_web_server_min_threads: 5
rmt_web_server_max_threads: 5
rmt_web_server_workers: 2

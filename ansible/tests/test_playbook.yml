---
- name: Test RMT playbook
  hosts: localhost
  connection: local
  gather_facts: true
  become: false

  vars:
    rmt:
      RMT_ORGANIZATION_USERNAME: "test-user"
      RMT_ORGANIZATION_PASSWORD: "test-pass"
    # Minimum version requirements for ansible-core and ansible
    min_ansible_version: "2.18"
    min_ansible_package_version: "11"
    # Minimum version requirements for dependent collections
    required_collections:
      "ansible.posix": "1.5.0"
      "community.crypto": "2.0.0"
      "community.general": "7.0.0"
      "community.mysql": "3.5.0"

  tasks:
    - name: Verify Ansible version
      ansible.builtin.assert:
        that:
          # Requires ansible-core 2.18+ (Ansible 11+ in SLE 16.0/16.1)
          - ansible_version.full is version(min_ansible_version, '>=')
        fail_msg: >-
          Ansible version must be {{ min_ansible_version }} or higher
          (Ansible >= {{ min_ansible_package_version }} in SLE 16.x)
        success_msg: "Ansible version check passed"

    - name: Retrieve current collection list
      ansible.builtin.command: >-
        ansible-galaxy collection list --format=json
      register: collection_list_result
      changed_when: false

      # The collection list output is a dict of dicts of dicts; top-level
      # entries are for each directory in the collections search path,
      # with an entry for each collection in that directory that tracks
      # the version of that collection, e.g.
      # {
      #   "/path/to/collections": {
      #     "some.collection": {
      #       "version": "1.0.0"
      #     },
      #     "another.collection": {
      #       "version": "2.0.0"
      #     },
      #     ...
      #   },
      #   "/path/to/more/collections": {
      #     ...
      #     "yet.another.collection": {
      #       "version": "3.0.0"
      #     }
      #   }
      # }
    - name: Extract found collection index from collection list output
      ansible.builtin.set_fact:
        # To create a dict mapping each collection to the first index
        # entry found for it, first we extract the set of collections
        # in each directory's entry as a list, and join the resulting
        # lists together.
        # Next we reverse the order of the joined list so that the first
        # occurrence becomes the last, at which point we use the combine
        # filter to merge the reversed list into a single dictionary,
        # where the last occurrence's entry is merged over any previous
        # occurrence.
        # This matches the search algorithm that Ansible uses to find
        # collections, and is reliable for Ansible running on Python
        # 3.6 or later, where dictionary insertion order is preserved.
        collection_index: >-
          {{ _imported_index.values() | list | reverse | combine }}
      vars:
        # Import the JSON representation of the collection list output
        # as a dict of dict of dicts.
        _imported_index: "{{ collection_list_result.stdout | from_json }}"

    - name: Ensure required collections are available with viable versions
      ansible.builtin.assert:
        that:
          - item.key in collection_index
          - collection_index[item.key].version is version(item.value, '>=')
        fail_msg: >-
          Required collection {{ item.key }} needs to be version >=
          {{ item.value }}, found to be {{ _found_entry.version }}
        success_msg: >-
          Required collection {{ item.key }} found with version
          {{ _found_entry.version }} >= {{ item.value }}
      loop: "{{ required_collections | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      vars:
        # retrieve index entry with useful default if not found
        _found_entry: >-
          {{ collection_index.get(item.key, {'version': 'NOT FOUND'}) }}

    - name: Verify RMT role directory structure
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../{{ item }}"
      register: role_structure
      loop:
        - roles/rmt
        - roles/rmt/tasks
        - roles/rmt/handlers
        - roles/rmt/templates
        - roles/rmt/files
        - roles/rmt/defaults
        - roles/rmt/meta

    - name: Check role structure results
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isdir
        fail_msg: "Missing role directory: {{ item.item }}"
      loop: "{{ role_structure.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Verify key role files exist
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../{{ item }}"
      register: role_files
      loop:
        - roles/rmt/tasks/main.yml
        - roles/rmt/handlers/main.yml
        - roles/rmt/defaults/main.yml
        - roles/rmt/meta/main.yml
        - roles/rmt/templates/rmt.conf.j2

    - name: Check role files exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isreg
        fail_msg: "Missing role file: {{ item.item }}"
      loop: "{{ role_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Verify configuration files exist
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../{{ item }}"
      register: config_files
      loop:
        - group_vars/all.yml
        - site.yml
        - ansible.cfg
        - requirements.yml

    - name: Check configuration files exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isreg
        fail_msg: "Missing configuration file: {{ item.item }}"
      loop: "{{ config_files.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Test summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "All tests passed successfully!"
          - "=========================================="
          - "✓ Ansible version check"
          - "✓ Required collections installed"
          - "✓ Role directory structure verified"
          - "✓ Role files verified"
          - "✓ Configuration files verified"
          - "=========================================="

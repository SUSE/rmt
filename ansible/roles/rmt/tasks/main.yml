# This playbook installs rmt but does not populate it
# To do so, ssh into the host and run the appropriate "rmt-cli" commands for
# mirroring products.

- name: Install rmt & dependencies
  community.general.zypper:
    name:
      - rmt-server
      - mariadb
      - nginx
      - python3-PyMySQL
    state: latest

- name: Ensure MariaDB service is started and enabled
  ansible.builtin.systemd:
    name: mariadb
    state: started
    enabled: true

# Check if RMT database exists to determine if we need to set it up
- name: Check if RMT database exists
  community.mysql.mysql_info:
    filter: databases
    login_unix_socket: /run/mysql/mysql.sock
  register: rmt_db_info
  ignore_errors: true

- name: Set fact for database existence
  ansible.builtin.set_fact:
    rmt_db_exists: "{{ rmt_db_name in rmt_db_info.databases.keys() | default([]) }}"
  when: rmt_db_info is succeeded

- name: Generate random database password if not set
  ansible.builtin.set_fact:
    rmt_db_password: "{{ lookup('ansible.builtin.password', '/dev/null', chars=['ascii_letters', 'digits'], length=32) }}"
  when: rmt_db_password == "" and not (rmt_db_exists | default(false))
  no_log: true

- name: Validate database password is set when database exists
  ansible.builtin.assert:
    that:
      - rmt_db_password != ""
    fail_msg: "Database password must be set in group_vars/all.yml when database already exists"
    quiet: true
  when: rmt_db_exists | default(false)

- name: Provision database
  ansible.builtin.include_tasks: db_setup.yml
  when: not (rmt_db_exists | default(false))

- name: Provision SSL certificates and nginx configuration
  ansible.builtin.include_tasks: ssl_setup.yml

# Configure rmt BEFORE migrations - the migration service needs this config to connect to DB
- name: Configure rmt.conf
  ansible.builtin.template:
    src: rmt.conf.j2
    dest: /etc/rmt.conf
    mode: "0644"
    owner: root
    group: root

- name: Run database migrations
  ansible.builtin.systemd:
    name: rmt-server-migration.service
    state: started
  when: not (rmt_db_exists | default(false))

- name: Ensure nginx service is started and enabled
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

- name: Ensure rmt-server service is started and enabled
  ansible.builtin.systemd:
    name: rmt-server
    state: started
    enabled: true

# This playbook installs rmt but does not populate it
# To do so, ssh into the host and run the appropriate "rmt-cli" commands for
# mirroring products.

- name: Install rmt & dependencies
  community.general.zypper:
    name:
      - rmt-server
      - mariadb
      - nginx
      - python3-PyMySQL
    state: latest

- name: Ensure MariaDB service is started and enabled
  ansible.builtin.systemd:
    name: mariadb
    state: started
    enabled: true

# Check if RMT database and user already exist
- name: Check if RMT database user exists
  community.mysql.mysql_query:
    login_unix_socket: /run/mysql/mysql.sock
    query: "SELECT User FROM mysql.user WHERE User = '{{ rmt_db_username }}' AND Host = 'localhost'"
  register: rmt_user_check
  ignore_errors: true
  changed_when: false
  when: not ansible_check_mode

- name: Set fact for database setup requirement
  ansible.builtin.set_fact:
    rmt_needs_db_setup: "{{ (ansible_check_mode) or (rmt_user_check.failed | default(true)) or ((rmt_user_check.rowcount[0] | default(0)) == 0) }}"

- name: Generate random database password if not set
  ansible.builtin.set_fact:
    rmt_db_password: "{{ lookup('ansible.builtin.password', '/dev/null', chars=['ascii_letters', 'digits'], length=32) }}"
  when: rmt_db_password == "" and rmt_needs_db_setup | default(false)
  no_log: true

- name: Validate database password is set when user already exists
  ansible.builtin.assert:
    that:
      - rmt_db_password != ""
    fail_msg: "Database password must be set in group_vars/all.yml when RMT database user already exists"
    quiet: true
  when: not (rmt_needs_db_setup | default(false))

- name: Provision database
  ansible.builtin.include_tasks: db_setup.yml
  when: rmt_needs_db_setup | default(false)

- name: Provision SSL certificates and nginx configuration
  ansible.builtin.include_tasks: ssl_setup.yml

# Configure rmt BEFORE migrations - the migration service needs this config to connect to DB
- name: Configure rmt.conf
  ansible.builtin.template:
    src: rmt.conf.j2
    dest: /etc/rmt.conf
    mode: "0644"
    owner: root
    group: root

- name: Run database migrations
  ansible.builtin.systemd:
    name: rmt-server-migration.service
    state: started
  when: rmt_needs_db_setup | default(false)

- name: Ensure nginx service is started and enabled
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

- name: Ensure rmt-server service is started and enabled
  ansible.builtin.systemd:
    name: rmt-server
    state: started
    enabled: true

---
# RMT role default variables

# RMT repository configuration
# Override this to use a different repository for RMT packages
rmt_repo_url: https://download.opensuse.org/repositories/systemsmanagement:/SCC:/RMT/SLE_15_SP7/
rmt_repo_name: rmt_3

# Database configuration
rmt_db_host: localhost
rmt_db_name: rmt
rmt_db_username: rmt
rmt_db_password: ""
rmt_db_adapter: mysql2
rmt_db_encoding: utf8
rmt_db_timeout: 5000
rmt_db_pool: 5

# SCC configuration
rmt_sync_systems: true
rmt_metrics_enabled: false
rmt_metrics_job_name: rmt

# Mirroring configuration
rmt_mirror_drpm: true
rmt_mirror_src: false
rmt_revalidate_repodata: true
rmt_dedup_method: hardlink

# HTTP client configuration
rmt_http_client_verbose: false
rmt_http_proxy: ""
rmt_http_proxy_auth: ""
rmt_http_proxy_user: ""
rmt_http_proxy_password: ""
rmt_low_speed_limit: 512
rmt_low_speed_time: 120

# Log level configuration
rmt_log_level_rails: info
rmt_log_level_cli: info

# Web server configuration
rmt_web_server_min_threads: 5
rmt_web_server_max_threads: 5
rmt_web_server_workers: 2

# SSL configuration
rmt_ssl_cert_path: /etc/rmt/ssl/rmt-server.crt
rmt_ssl_key_path: /etc/rmt/ssl/rmt-server.key
rmt_ca_cert_path: /etc/rmt/ssl/rmt-ca.crt
rmt_ssl_cert_validity_days: 3650  # 10 years
rmt_ssl_key_size: 4096

# Service configuration
rmt_enable_http: true
rmt_enable_https: true

# This playbook installs rmt but does not populate it
# To do so, ssh into the host and run the appropriate "rmt-cli" commands for
# mirroring products.

- name: Add RMT repo
  community.general.zypper_repository:
    repo: "{{ rmt_repo_url }}"
    name: "{{ rmt_repo_name }}"
    auto_import_keys: true

- name: Install rmt & dependencies
  community.general.zypper:
    name:
      - rmt-server
      - mariadb
      - nginx
    state: latest

- name: Install Python 3.11 pip
  community.general.zypper:
    name: python311-pip
    state: present
    disable_recommends: false

# PyMySQL is required by Ansible's community.mysql modules to connect to MariaDB/MySQL
- name: Ensure PyMySQL is installed for Python 3.11
  ansible.builtin.pip:
    name: PyMySQL
    executable: /usr/bin/pip3.11

- name: Ensure MariaDB service is started and enabled
  ansible.builtin.systemd:
    name: mariadb
    state: started
    enabled: true

- name: Create RMT database
  ansible.mysql.mysql_db:
    name: "{{ rmt_db_name }}"
    state: present
    encoding: "{{ rmt_db_encoding }}"
    login_unix_socket: /run/mysql/mysql.sock

- name: Create RMT database user
  ansible.mysql.mysql_user:
    name: "{{ rmt_db_username }}"
    password: "{{ rmt_db_password | default('rmt', true) }}"
    priv: "{{ rmt_db_name }}.*:ALL"
    state: present
    login_unix_socket: /run/mysql/mysql.sock
  no_log: true

- name: Enable and run rmt-migration service
  ansible.builtin.systemd:
    name: rmt-migration
    state: started
    enabled: true

# Configure rmt
- name: Modify rmt.conf
  ansible.builtin.template:
    src: rmt.conf.j2
    dest: /etc/rmt.conf
    mode: "0644"
    owner: root
    group: root
  notify: Restart rmt

- name: Provision HTTP (Plain Text) nginx config
  ansible.builtin.template:
    src: rmt_host_plain_text.conf.j2
    dest: /etc/nginx/vhosts.d/rmt-server-http.conf
    mode: "0644"
    owner: root
    group: root
  notify: Reload nginx

- name: Provision RMT Upstream section
  ansible.builtin.template:
    src: rmt_upstreams.conf
    dest: /etc/nginx/vhosts.d/rmt_upstreams.conf
    mode: "0644"
    owner: root
    group: root
  notify: Reload nginx

- name: Create SSL directory
  ansible.builtin.file:
    path: /etc/rmt/ssl
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Generate RMT server private key
  community.crypto.openssl_privatekey:
    path: /etc/rmt/ssl/rmt-server.key
    size: 4096
    mode: "0600"
    owner: root
    group: root

- name: Generate RMT server certificate
  community.crypto.x509_certificate:
    path: /etc/rmt/ssl/rmt-server.crt
    privatekey_path: /etc/rmt/ssl/rmt-server.key
    provider: selfsigned
    selfsigned_not_after: "+3650d"
    mode: "0644"
    owner: root
    group: root

- name: Generate RMT CA private key
  community.crypto.openssl_privatekey:
    path: /etc/rmt/ssl/rmt-ca.key
    size: 4096
    mode: "0600"
    owner: root
    group: root

- name: Generate RMT CA certificate
  community.crypto.x509_certificate:
    path: /etc/rmt/ssl/rmt-ca.crt
    privatekey_path: /etc/rmt/ssl/rmt-ca.key
    provider: selfsigned
    selfsigned_not_after: "+3650d"
    mode: "0644"
    owner: root
    group: root

- name: Provision HTTPS (SSL) nginx config
  ansible.builtin.template:
    src: rmt_host_http_ssl.conf.j2
    dest: /etc/nginx/vhosts.d/rmt-server-https.conf
    mode: "0644"
    owner: root
    group: root
  notify: Reload nginx
